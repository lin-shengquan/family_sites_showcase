<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 家庭网站作品展海报</title>
  <link rel="stylesheet" href="poster.css">
</head>
<body>
  <section class="poster">
    <header class="poster-header">
      <p>AI 网站设计营</p>
      <h1>家庭网站作品展</h1>
      <span>扫码进入作品入口页，点击图片即可访问网站并点赞</span>
    </header>

    <div class="poster-grid">
      <article><img src="assets/screenshots/yy.png" alt=""><b>原毓</b></article>
      <article><img src="assets/screenshots/dc.png" alt=""><b>道翀</b></article>
      <article><img src="assets/screenshots/lt.png" alt=""><b>林通</b></article>
      <article><img src="assets/screenshots/yufan.png" alt=""><b>羽帆</b></article>
      <article><img src="assets/screenshots/ym.png" alt=""><b>堉铭</b></article>
      <article><img src="assets/screenshots/ziyi.png" alt=""><b>梓依</b></article>
      <article><img src="assets/screenshots/hs.png" alt=""><b>泓胜</b></article>
      <article><img src="assets/screenshots/jh.png" alt=""><b>靖淮</b></article>
    </div>

    <footer class="poster-footer">
      <div>
        <h2>扫码参观</h2>
        <p>家长扫码进入作品集页面，选择对应作品即可浏览。每人最多可投 3 票。</p>
      </div>
      <img class="qr" src="assets/qr.png" alt="作品入口二维码">
    </footer>
  </section>
</body>
</html>
