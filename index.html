<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 家庭网站作品展数据库投票</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page-shell">
    <header class="site-header">
      <p class="eyebrow">AI 网站设计营</p>
      <h1>家庭网站作品展</h1>
      <p class="subhead">点击作品图片可访问网站。投票会写入线上数据库，每位家长最多可投 3 票，每个作品限投 1 票。</p>
      <div class="vote-status" aria-live="polite">
        已投 <strong id="usedVotes">0</strong> / 3 票
        <span id="dbStatus" class="db-status">数据库连接中</span>
      </div>
    </header>

    <section class="gallery" aria-label="家庭网站作品列表">
      <article class="site-card" data-id="yy">
        <a class="site-link" href="https://lin-shengquan.github.io/yy_family_website/" target="_blank" rel="noopener">
          <img src="assets/screenshots/yy.png" alt="原毓作品主页截图">
        </a>
        <div class="card-footer">
          <div>
            <span>原毓</span>
            <small><strong data-count="yy">0</strong> 票</small>
          </div>
          <button type="button" class="vote-button" data-vote="yy">点赞</button>
        </div>
      </article>

      <article class="site-card" data-id="dc">
        <a class="site-link" href="https://lin-shengquan.github.io/dc_family_website/" target="_blank" rel="noopener">
          <img src="assets/screenshots/dc.png" alt="道翀作品主页截图">
        </a>
        <div class="card-footer">
          <div>
            <span>道翀</span>
            <small><strong data-count="dc">0</strong> 票</small>
          </div>
          <button type="button" class="vote-button" data-vote="dc">点赞</button>
        </div>
      </article>

      <article class="site-card" data-id="lt">
        <a class="site-link" href="https://lin-shengquan.github.io/lt_family_website/" target="_blank" rel="noopener">
          <img src="assets/screenshots/lt.png" alt="林通作品主页截图">
        </a>
        <div class="card-footer">
          <div>
            <span>林通</span>
            <small><strong data-count="lt">0</strong> 票</small>
          </div>
          <button type="button" class="vote-button" data-vote="lt">点赞</button>
        </div>
      </article>

      <article class="site-card" data-id="yufan">
        <a class="site-link" href="https://lin-shengquan.github.io/yufan_family_website/" target="_blank" rel="noopener">
          <img src="assets/screenshots/yufan.png" alt="羽帆作品主页截图">
        </a>
        <div class="card-footer">
          <div>
            <span>羽帆</span>
            <small><strong data-count="yufan">0</strong> 票</small>
          </div>
          <button type="button" class="vote-button" data-vote="yufan">点赞</button>
        </div>
      </article>

      <article class="site-card" data-id="ym">
        <a class="site-link" href="https://lin-shengquan.github.io/ym_family_website/" target="_blank" rel="noopener">
          <img src="assets/screenshots/ym.png" alt="堉铭作品主页截图">
        </a>
        <div class="card-footer">
          <div>
            <span>堉铭</span>
            <small><strong data-count="ym">0</strong> 票</small>
          </div>
          <button type="button" class="vote-button" data-vote="ym">点赞</button>
        </div>
      </article>

      <article class="site-card" data-id="ziyi">
        <a class="site-link" href="https://lin-shengquan.github.io/ziyi_family_website/" target="_blank" rel="noopener">
          <img src="assets/screenshots/ziyi.png" alt="梓依作品主页截图">
        </a>
        <div class="card-footer">
          <div>
            <span>梓依</span>
            <small><strong data-count="ziyi">0</strong> 票</small>
          </div>
          <button type="button" class="vote-button" data-vote="ziyi">点赞</button>
        </div>
      </article>

      <article class="site-card" data-id="hs">
        <a class="site-link" href="https://lin-shengquan.github.io/hs_family_website/" target="_blank" rel="noopener">
          <img src="assets/screenshots/hs.png" alt="泓胜作品主页截图">
        </a>
        <div class="card-footer">
          <div>
            <span>泓胜</span>
            <small><strong data-count="hs">0</strong> 票</small>
          </div>
          <button type="button" class="vote-button" data-vote="hs">点赞</button>
        </div>
      </article>

      <article class="site-card" data-id="jh">
        <a class="site-link" href="https://lin-shengquan.github.io/jh_family_website/" target="_blank" rel="noopener">
          <img src="assets/screenshots/jh.png" alt="靖淮作品主页截图">
        </a>
        <div class="card-footer">
          <div>
            <span>靖淮</span>
            <small><strong data-count="jh">0</strong> 票</small>
          </div>
          <button type="button" class="vote-button" data-vote="jh">点赞</button>
        </div>
      </article>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="script.js"></script>
</body>
</html>
